name : CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du projet
        uses: actions/checkout@v4

      - name: Installer Nodejs
        uses: actions/setup-node@v4

      - name: Installer les dépendances
        run: npm install

      # Étape CRUCIALE : Installer les navigateurs pour Playwright
      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps

      - name: Exécuter les tests unitaires et intégration
        run: npm run test:unit && npm run test:integration

      - name: Exécuter les tests E2E
        run: npm run test:e2e

      # Déploiement uniquement si TOUS les tests passent
      - name: Déclencher le déploiement
        if: success()
        run: curl -X POST "${{ secrets.RENDER_SECRET_HOOK_DEPLOY }}"